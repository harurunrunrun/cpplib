name: verify

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "Makefile"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "Makefile"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standalone-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run standalone preflight
        run: make standalone-assets-test

  standalone-assets:
    needs: standalone-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        index: [0, 1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify standalone generated assets
        run: |
          python3 scripts/run_standalone_assets.py \
            --split-size 4 \
            --split-index ${{ matrix.index }}

      - name: Upload standalone verification results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: standalone-results-${{ github.run_attempt }}-${{ matrix.index }}
          path: .competitive-verifier/cache/standalone-results
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: true

  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      indices: ${{ steps.plan.outputs.indices }}
      shard_count: ${{ steps.plan.outputs.shard_count }}
      verification_file_count: ${{ steps.plan.outputs.verification_file_count }}
      verification_count: ${{ steps.plan.outputs.verification_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reject forbidden Boost dependencies
        run: |
          python3 scripts/test_check_no_boost_dependency.py
          python3 scripts/check_no_boost_dependency.py src test docs

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
        with:
          python-version: "3.12"
          cache-pip: true

      - name: Configure competitive-verifier compiler wrapper
        shell: bash
        run: |
          echo "COMPETITIVE_VERIFIER_REAL_GXX=$(command -v g++)" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/scripts/competitive_verifier_gcc15" >> "$GITHUB_PATH"

      - name: Test competitive-verifier compiler wrapper
        run: |
          python3 scripts/test_competitive_verifier_gcc15_wrapper.py

      - name: Resolve online judge verification files
        uses: competitive-verifier/actions/oj-resolve@v2
        with:
          output-path: verify-files.json
          config: config.toml
          include: |
            src
            test/onlinejudge

      - name: Normalize verification plan
        run: |
          python3 scripts/test_check_unsupported_onlinejudge_assets.py
          python3 scripts/check_unsupported_onlinejudge_assets.py
          python3 scripts/test_normalize_competitive_verifier_plan.py
          python3 scripts/normalize_competitive_verifier_plan.py verify-files.json
          python3 scripts/test_filter_competitive_verifier_result.py
          python3 scripts/test_report_competitive_verifier_failures.py
          python3 scripts/test_run_competitive_verifier_shards.py

      - name: Plan verification shards
        id: plan
        shell: bash
        env:
          TARGET_FILES_PER_SHARD: "24"
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          target_files_per_shard = int(os.environ["TARGET_FILES_PER_SHARD"])
          with Path("verify-files.json").open(encoding="utf-8") as file:
              verify_files = json.load(file)

          files = verify_files.get("files")
          if not isinstance(files, dict):
              raise SystemExit("verify-files.json does not contain a files object")

          verification_file_count = 0
          verification_count = 0
          for path, data in files.items():
              if not isinstance(data, dict):
                  raise SystemExit(f"invalid verify file entry: {path}")
              verification = data.get("verification", [])
              if not isinstance(verification, list):
                  raise SystemExit(f"invalid verification list: {path}")
              verification_file_count += bool(verification)
              verification_count += len(verification)

          shard_count = (
              verification_file_count + target_files_per_shard - 1
          ) // target_files_per_shard
          indices = list(range(shard_count))
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as file:
              file.write(f"indices={json.dumps(indices, separators=(',', ':'))}\n")
              file.write(f"shard_count={shard_count}\n")
              file.write(f"verification_file_count={verification_file_count}\n")
              file.write(f"verification_count={verification_count}\n")

          print(
              f"verification_file_count={verification_file_count}, "
              f"verification_count={verification_count}, "
              f"target_files_per_shard={target_files_per_shard}, "
              f"shard_count={shard_count}"
          )
          PY

      - name: Upload resolved verification files
        uses: actions/upload-artifact@v4
        with:
          name: verify-files-${{ github.run_attempt }}
          path: verify-files.json
          if-no-files-found: error
          retention-days: 7

  verify:
    if: ${{ needs.resolve.result == 'success' && needs.resolve.outputs.shard_count != '0' }}
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        index: ${{ fromJSON(needs.resolve.outputs.indices) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
        with:
          python-version: "3.12"
          cache-pip: true

      - name: Configure competitive-verifier compiler wrapper
        shell: bash
        run: |
          echo "COMPETITIVE_VERIFIER_REAL_GXX=$(command -v g++)" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/scripts/competitive_verifier_gcc15" >> "$GITHUB_PATH"

      - name: Test competitive-verifier compiler wrapper
        run: |
          python3 scripts/test_competitive_verifier_gcc15_wrapper.py

      - name: Download resolved verification files
        uses: actions/download-artifact@v4
        with:
          name: verify-files-${{ github.run_attempt }}
          path: .

      - name: Prepare verification directories
        shell: bash
        run: mkdir -p .competitive-verifier/cache .competitive-verifier/shards

      - name: Restore previous verification result
        id: result_cache
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: .competitive-verifier/cache/result.json
          key: competitive-verifier-result-${{ hashFiles('config.toml') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            competitive-verifier-result-${{ hashFiles('config.toml') }}-
            competitive-verifier-result-

      - name: Filter restored successful verification results
        id: previous
        shell: bash
        run: |
          path=.competitive-verifier/cache/result.json
          selected=
          if [ -f "$path" ] && python3 scripts/filter_competitive_verifier_result.py \
              --verify-json verify-files.json \
              --result "$path" \
              --success-only; then
            selected="$path"
          fi
          echo "path=$selected" >> "$GITHUB_OUTPUT"

      - name: Verify shard ${{ matrix.index }} (attempt 1)
        id: verifier_initial
        uses: competitive-verifier/actions/verify@v2
        timeout-minutes: 14
        continue-on-error: true
        with:
          verify-files: verify-files.json
          destination: .competitive-verifier/shards/result-${{ matrix.index }}-attempt-1.json
          prev-result: ${{ steps.previous.outputs.path }}
          split-size: ${{ needs.resolve.outputs.shard_count }}
          split-index: ${{ matrix.index }}
          timeout: "780"
          check: false

      - name: Prepare successful results for attempt 2
        id: retry_previous_1
        if: ${{ always() && steps.verifier_initial.outputs.is-success != 'true' }}
        shell: bash
        env:
          CANDIDATE: .competitive-verifier/shards/result-${{ matrix.index }}-attempt-1.json
          FALLBACK: ${{ steps.previous.outputs.path }}
          DESTINATION: .competitive-verifier/shards/previous-${{ matrix.index }}-attempt-1.json
        run: |
          selected=
          if [ -f "$CANDIDATE" ] && python3 scripts/filter_competitive_verifier_result.py \
              --verify-json verify-files.json \
              --result "$CANDIDATE" \
              --output "$DESTINATION" \
              --success-only; then
            selected="$DESTINATION"
          elif [ -n "$FALLBACK" ] && [ -f "$FALLBACK" ]; then
            selected="$FALLBACK"
          fi
          echo "path=$selected" >> "$GITHUB_OUTPUT"

      - name: Retry failed verification entries (attempt 2)
        id: verifier_retry_1
        if: ${{ always() && steps.verifier_initial.outputs.is-success != 'true' }}
        uses: competitive-verifier/actions/verify@v2
        timeout-minutes: 4
        continue-on-error: true
        with:
          verify-files: verify-files.json
          destination: .competitive-verifier/shards/result-${{ matrix.index }}-attempt-2.json
          prev-result: ${{ steps.retry_previous_1.outputs.path }}
          split-size: ${{ needs.resolve.outputs.shard_count }}
          split-index: ${{ matrix.index }}
          timeout: "180"
          check: false

      - name: Prepare successful results for attempt 3
        id: retry_previous_2
        if: ${{ always() && steps.verifier_retry_1.outcome != 'skipped' && steps.verifier_retry_1.outputs.is-success != 'true' }}
        shell: bash
        env:
          CANDIDATE: .competitive-verifier/shards/result-${{ matrix.index }}-attempt-2.json
          FALLBACK: ${{ steps.retry_previous_1.outputs.path }}
          DESTINATION: .competitive-verifier/shards/previous-${{ matrix.index }}-attempt-2.json
        run: |
          selected=
          if [ -f "$CANDIDATE" ] && python3 scripts/filter_competitive_verifier_result.py \
              --verify-json verify-files.json \
              --result "$CANDIDATE" \
              --output "$DESTINATION" \
              --success-only; then
            selected="$DESTINATION"
          elif [ -n "$FALLBACK" ] && [ -f "$FALLBACK" ]; then
            selected="$FALLBACK"
          fi
          echo "path=$selected" >> "$GITHUB_OUTPUT"

      - name: Retry failed verification entries (attempt 3)
        id: verifier_retry_2
        if: ${{ always() && steps.verifier_retry_1.outcome != 'skipped' && steps.verifier_retry_1.outputs.is-success != 'true' }}
        uses: competitive-verifier/actions/verify@v2
        timeout-minutes: 4
        continue-on-error: true
        with:
          verify-files: verify-files.json
          destination: .competitive-verifier/shards/result-${{ matrix.index }}-attempt-3.json
          prev-result: ${{ steps.retry_previous_2.outputs.path }}
          split-size: ${{ needs.resolve.outputs.shard_count }}
          split-index: ${{ matrix.index }}
          timeout: "180"
          check: false

      - name: Select latest valid shard result
        id: verifier
        if: ${{ always() }}
        shell: bash
        env:
          SHARD_INDEX: ${{ matrix.index }}
        run: |
          python3 - <<'PY'
          import os
          import shutil
          from pathlib import Path
          from competitive_verifier.models import VerifyCommandResult

          index = int(os.environ["SHARD_INDEX"])
          root = Path(".competitive-verifier/shards")
          destination = root / f"result-{index}.json"

          for attempt in (3, 2, 1):
              candidate = root / f"result-{index}-attempt-{attempt}.json"
              if not candidate.is_file():
                  continue
              try:
                  VerifyCommandResult.model_validate_json(candidate.read_bytes())
              except (OSError, UnicodeError, ValueError):
                  continue
              shutil.copyfile(candidate, destination)
              print(f"selected {candidate}")
              break
          else:
              raise SystemExit("no valid verification result was produced")
          PY

      - name: Record shard status
        id: shard_status
        if: ${{ always() }}
        shell: bash
        env:
          SHARD_INDEX: ${{ matrix.index }}
          VERIFY_OUTCOME: ${{ steps.verifier.outcome }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from competitive_verifier.models import VerifyCommandResult

          index = int(os.environ["SHARD_INDEX"])
          outcome = os.environ.get("VERIFY_OUTCOME", "")
          result_path = Path(f".competitive-verifier/shards/result-{index}.json")

          result_valid = False
          if result_path.is_file():
              try:
                  VerifyCommandResult.model_validate_json(result_path.read_bytes())
                  result_valid = True
              except (OSError, UnicodeError, ValueError):
                  pass

          status = {
              "index": index,
              "outcome": outcome,
              # The action's is-success output covers the inherited previous
              # result too. Another shard may refresh a stale failure, so only
              # the merged result can decide verification success.
              "is_success": outcome == "success" and result_valid,
              "result_exists": result_path.is_file(),
              "result_valid": result_valid,
          }
          status_path = Path(f".competitive-verifier/shards/status-{index}.json")
          status_path.parent.mkdir(parents=True, exist_ok=True)
          status_path.write_text(json.dumps(status, sort_keys=True) + "\n", encoding="utf-8")
          print(json.dumps(status, sort_keys=True))
          PY

      - name: Upload shard result and status
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: verify-shard-${{ github.run_attempt }}-${{ matrix.index }}
          path: |
            .competitive-verifier/shards/result-${{ matrix.index }}.json
            .competitive-verifier/shards/status-${{ matrix.index }}.json
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: true

  merge-and-check:
    if: ${{ always() }}
    needs:
      - resolve
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
        with:
          python-version: "3.12"
          cache-pip: true

      - name: Download resolved verification files
        id: download_verify_files
        if: ${{ always() }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: verify-files-${{ github.run_attempt }}
          path: .

      - name: Download shard artifacts
        id: download_shards
        if: ${{ always() }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: verify-shard-${{ github.run_attempt }}-*
          path: shard-artifacts
          merge-multiple: true

      - name: Inventory shard artifacts
        id: inventory
        if: ${{ always() }}
        shell: bash
        env:
          EXPECTED_SHARDS: ${{ needs.resolve.outputs.shard_count }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from competitive_verifier.models import VerifyCommandResult

          root = Path("shard-artifacts")
          cache = Path(".competitive-verifier/cache")
          cache.mkdir(parents=True, exist_ok=True)

          try:
              expected = int(os.environ.get("EXPECTED_SHARDS", ""))
              if expected < 0:
                  raise ValueError
              plan_valid = True
          except ValueError:
              expected = 0
              plan_valid = False

          missing = []
          false_indices = []
          invalid = []
          valid_results = []

          for index in range(expected):
              status_path = root / f"status-{index}.json"
              result_path = root / f"result-{index}.json"

              if not status_path.is_file():
                  missing.append(index)
              else:
                  try:
                      status = json.loads(status_path.read_text(encoding="utf-8"))
                      if not isinstance(status, dict) or status.get("index") != index:
                          raise ValueError
                      if status.get("is_success") is not True:
                          false_indices.append(index)
                  except (OSError, UnicodeError, json.JSONDecodeError, ValueError):
                      invalid.append(index)

              try:
                  VerifyCommandResult.model_validate_json(result_path.read_bytes())
                  valid_results.append(str(result_path))
              except (OSError, UnicodeError, ValueError):
                  if index not in invalid:
                      invalid.append(index)

          inventory = {
              "plan_valid": plan_valid,
              "expected_shards": expected,
              "missing": missing,
              "false": false_indices,
              "invalid": invalid,
              "valid_results": valid_results,
          }
          (cache / "shard-inventory.json").write_text(
              json.dumps(inventory, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          def emit(name, value):
              with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as file:
                  file.write(f"{name}={value}\n")

          emit("plan_valid", str(plan_valid).lower())
          emit("valid_count", len(valid_results))
          emit("result_files", " ".join(valid_results))
          emit("missing", json.dumps(missing, separators=(",", ":")))
          emit("false_indices", json.dumps(false_indices, separators=(",", ":")))
          emit("invalid", json.dumps(invalid, separators=(",", ":")))
          print(json.dumps(inventory, sort_keys=True))
          PY

      - name: Merge shard results
        id: merge
        if: ${{ always() && steps.inventory.outputs.valid_count != '0' }}
        uses: competitive-verifier/actions/merge-result@v2
        continue-on-error: true
        with:
          result-files: ${{ steps.inventory.outputs.result_files }}
          output-path: .competitive-verifier/cache/result.json

      - name: Filter stale verification results
        id: filter_result
        if: ${{ always() }}
        shell: bash
        continue-on-error: true
        run: |
          python3 scripts/filter_competitive_verifier_result.py \
            --verify-json verify-files.json \
            --result .competitive-verifier/cache/result.json

      - name: Ensure a valid merged result
        id: merged_result
        if: ${{ always() }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from competitive_verifier.models import VerifyCommandResult

          path = Path(".competitive-verifier/cache/result.json")
          fallback = True
          if path.is_file():
              try:
                  VerifyCommandResult.model_validate_json(path.read_bytes())
                  fallback = False
              except (OSError, UnicodeError, ValueError):
                  pass

          if fallback:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(
                  json.dumps({"total_seconds": 0, "files": {}}, sort_keys=True) + "\n",
                  encoding="utf-8",
              )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as file:
              file.write(f"fallback={str(fallback).lower()}\n")
          PY

      - name: Preserve complete merged verification result
        id: preserve_result
        if: ${{ always() && steps.filter_result.outcome == 'success' && steps.merged_result.outputs.fallback == 'false' }}
        shell: bash
        run: |
          mkdir -p .competitive-verifier/merged
          cp .competitive-verifier/cache/result.json \
            .competitive-verifier/merged/result.json

      - name: Prepare successful verification cache
        id: cache_result
        if: ${{ always() && steps.preserve_result.outcome == 'success' }}
        shell: bash
        continue-on-error: true
        run: |
          python3 scripts/filter_competitive_verifier_result.py \
            --verify-json verify-files.json \
            --result .competitive-verifier/cache/result.json \
            --success-only

      - name: Save successful verification cache
        id: save_cache
        if: ${{ always() && steps.cache_result.outcome == 'success' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .competitive-verifier/cache/result.json
          key: competitive-verifier-result-${{ hashFiles('config.toml') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload merged verification result
        id: upload_merged
        if: ${{ always() && steps.preserve_result.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: competitive-verifier-result-${{ github.run_attempt }}
          path: .competitive-verifier/merged/result.json
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: true

      - name: Check merged verification result
        id: check
        if: ${{ always() && steps.preserve_result.outcome == 'success' }}
        uses: competitive-verifier/actions/check@v2
        continue-on-error: true
        with:
          verify-result: .competitive-verifier/merged/result.json

      - name: Report verification failures
        if: ${{ always() }}
        shell: bash
        env:
          RESOLVE_RESULT: ${{ needs.resolve.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          EXPECTED_SHARDS: ${{ needs.resolve.outputs.shard_count }}
          EXPECTED_VERIFICATIONS: ${{ needs.resolve.outputs.verification_count }}
          PLAN_VALID: ${{ steps.inventory.outputs.plan_valid }}
          MISSING_SHARDS: ${{ steps.inventory.outputs.missing }}
          FALSE_SHARDS: ${{ steps.inventory.outputs.false_indices }}
          INVALID_SHARDS: ${{ steps.inventory.outputs.invalid }}
          MERGE_OUTCOME: ${{ steps.merge.outcome }}
          FILTER_OUTCOME: ${{ steps.filter_result.outcome }}
          USED_FALLBACK: ${{ steps.merged_result.outputs.fallback }}
          CACHE_SAVE_OUTCOME: ${{ steps.save_cache.outcome }}
          PRESERVE_OUTCOME: ${{ steps.preserve_result.outcome }}
          CACHE_PREP_OUTCOME: ${{ steps.cache_result.outcome }}
          CHECK_OUTCOME: ${{ steps.check.outcome }}
          CHECK_COUNT: ${{ steps.check.outputs.result-count }}
          CHECK_FAILURE: ${{ steps.check.outputs.result-count-failure }}
          CHECK_SKIPPED: ${{ steps.check.outputs.result-count-skipped }}
        run: |
          status=0

          report_error() {
            echo "::error::$1"
            status=1
          }
          report_warning() {
            echo "::warning::$1"
          }


          if ! python3 scripts/report_competitive_verifier_failures.py \
              --result .competitive-verifier/merged/result.json; then
            report_error "Detailed competitive-verifier diagnostics could not be produced"
          fi

          if [ "$RESOLVE_RESULT" != "success" ]; then
            report_error "Verification file resolution did not succeed: $RESOLVE_RESULT"
          fi
          if [ "$PLAN_VALID" != "true" ]; then
            report_error "The verification shard plan is missing or invalid"
          fi
          if ! [[ "$EXPECTED_SHARDS" =~ ^[0-9]+$ ]] || [ "$EXPECTED_SHARDS" -eq 0 ]; then
            report_error "No verification shards were planned"
          fi
          if [ "$VERIFY_RESULT" != "success" ]; then
            report_error "One or more verification shard jobs did not succeed: $VERIFY_RESULT"
          fi
          if [ -z "$MISSING_SHARDS" ] || [ "$MISSING_SHARDS" != "[]" ]; then
            report_error "Missing shard status artifacts: ${MISSING_SHARDS:-unknown}"
          fi
          if [ -z "$FALSE_SHARDS" ] || [ "$FALSE_SHARDS" != "[]" ]; then
            report_error "Verification reported false for shards: ${FALSE_SHARDS:-unknown}"
          fi
          if [ -z "$INVALID_SHARDS" ] || [ "$INVALID_SHARDS" != "[]" ]; then
            report_error "Invalid or missing shard results: ${INVALID_SHARDS:-unknown}"
          fi
          if [ "$MERGE_OUTCOME" != "success" ]; then
            report_error "Shard result merge did not succeed: $MERGE_OUTCOME"
          fi
          if [ "$FILTER_OUTCOME" != "success" ]; then
            report_error "Stale verification result filtering did not succeed: $FILTER_OUTCOME"
          fi
          if [ "$USED_FALLBACK" != "false" ]; then
            report_error "The merged result required an empty JSON fallback"
          fi
          if [ "$PRESERVE_OUTCOME" != "success" ]; then
            report_error "The complete merged result was not preserved: ${PRESERVE_OUTCOME:-unknown}"
          fi
          if [ "$CACHE_PREP_OUTCOME" != "success" ]; then
            report_warning "The successful-result cache was not prepared: ${CACHE_PREP_OUTCOME:-unknown}"
          fi
          if [ "$CACHE_PREP_OUTCOME" = "success" ] && [ "$CACHE_SAVE_OUTCOME" != "success" ]; then
            report_warning "The successful-result cache was not saved: ${CACHE_SAVE_OUTCOME:-unknown}"
          fi
          if [ "$CHECK_OUTCOME" != "success" ]; then
            report_error "competitive-verifier check failed or was skipped: $CHECK_OUTCOME"
          fi
          if ! [[ "$CHECK_FAILURE" =~ ^[0-9]+$ ]] || [ "$CHECK_FAILURE" -ne 0 ]; then
            report_error "competitive-verifier check failures: ${CHECK_FAILURE:-unknown}"
          fi
          if ! [[ "$CHECK_SKIPPED" =~ ^[0-9]+$ ]] || [ "$CHECK_SKIPPED" -ne 0 ]; then
            report_error "competitive-verifier check skipped results: ${CHECK_SKIPPED:-unknown}"
          fi
          if ! [[ "$EXPECTED_VERIFICATIONS" =~ ^[0-9]+$ ]] || \
             ! [[ "$CHECK_COUNT" =~ ^[0-9]+$ ]] || \
             [ "$CHECK_COUNT" -ne "$EXPECTED_VERIFICATIONS" ]; then
            report_error \
              "Merged result count ${CHECK_COUNT:-unknown} does not match expected ${EXPECTED_VERIFICATIONS:-unknown}"
          fi

          exit "$status"
