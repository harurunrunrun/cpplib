name: verify

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "docs/**"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "docs/**"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
        with:
          python-version: "3.12"
          cache-pip: true

      - name: Resolve verify files
        uses: competitive-verifier/actions/oj-resolve@v2
        with:
          output-path: verify-files.json
          config: config.toml
          include: |
            src
            test

      - name: Prepare cache directory
        run: mkdir -p .competitive-verifier/cache

      - name: Restore previous verify result
        uses: actions/cache@v4
        with:
          path: .competitive-verifier/cache/result.json
          key: competitive-verifier-result-${{ hashFiles('config.toml', '.github/workflows/verify.yaml') }}-${{ github.run_id }}
          restore-keys: |
            competitive-verifier-result-${{ hashFiles('config.toml', '.github/workflows/verify.yaml') }}-

      - name: Detect previous verify result
        id: prev-result
        shell: bash
        run: |
          if [ -f .competitive-verifier/cache/result.json ]; then
            echo "path=.competitive-verifier/cache/result.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify
        uses: competitive-verifier/actions/verify@v2
        with:
          verify-files: verify-files.json
          destination: .competitive-verifier/cache/result.json
          prev-result: ${{ steps.prev-result.outputs.path }}
          check: true

      - name: Generate docs
        uses: competitive-verifier/actions/docs@v2
        with:
          verify-files: verify-files.json
          verify-result: .competitive-verifier/cache/result.json
          destination: _jekyll

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        if: github.ref == 'refs/heads/main'
        uses: actions/jekyll-build-pages@v1
        with:
          source: _jekyll
          destination: _site
      
      - name: Remove unsafe polyfill.io reference
        if: github.ref == 'refs/heads/main'
        run: |
          sudo chown -R "$USER":"$USER" _site

          python3 - <<'PY'
          from pathlib import Path
          import re

          pattern = re.compile(
              r'\s*<script\s+src="https://polyfill\.io/v3/polyfill\.min\.js\?features=es6"></script>\s*',
              re.IGNORECASE,
          )

          for path in Path("_site").rglob("*.html"):
              text = path.read_text(encoding="utf-8", errors="ignore")
              new_text = pattern.sub("\n", text)
              if new_text != text:
                  path.write_text(new_text, encoding="utf-8")
                  print(f"removed from {path}")
          PY

      - name: Check generated site for unsafe CDN references
        if: github.ref == 'refs/heads/main'
        run: |
          if grep -RInE 'polyfill\.io|bootcss\.com|bootcdn\.net|staticfile\.org' _site; then
            echo "::error::Unsafe CDN reference remains in generated site"
            exit 1
          fi

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: verify-and-docs
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4