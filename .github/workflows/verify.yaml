name: verify

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "Makefile"
      - "docs/**"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "Makefile"
      - "docs/**"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      pages: write
      id-token: write

    outputs:
      standalone-outcome: ${{ steps.standalone.outcome }}
      verifier-outcome: ${{ steps.verifier.outcome }}
      pages-artifact-outcome: ${{ steps.pages-artifact.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@v2
        with:
          python-version: "3.12"
          cache-pip: true

      - name: Verify standalone generated assets
        id: standalone
        run: make standalone-assets
        continue-on-error: true

      - name: Resolve verify files
        id: resolve
        if: ${{ !cancelled() }}
        uses: competitive-verifier/actions/oj-resolve@v2
        with:
          output-path: verify-files.json
          config: config.toml
          include: |
            src
            test

      - name: Prepare cache directory
        id: cache_dir
        if: ${{ !cancelled() && steps.resolve.outcome == 'success' }}
        run: mkdir -p .competitive-verifier/cache

      - name: Restore previous verify result
        id: verify_cache
        if: ${{ !cancelled() && steps.cache_dir.outcome == 'success' }}
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: .competitive-verifier/cache/result.json
          key: competitive-verifier-result-${{ hashFiles('config.toml', '.github/workflows/verify.yaml') }}-${{ github.run_id }}
          restore-keys: |
            competitive-verifier-result-${{ hashFiles('config.toml', '.github/workflows/verify.yaml') }}-

      - name: Detect previous verify result
        id: prev-result
        if: ${{ !cancelled() && steps.resolve.outcome == 'success' && steps.cache_dir.outcome == 'success' }}
        shell: bash
        run: |
          if [ -f .competitive-verifier/cache/result.json ]; then
            echo "path=.competitive-verifier/cache/result.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify
        id: verifier
        uses: competitive-verifier/actions/verify@v2
        if: ${{ !cancelled() && steps.resolve.outcome == 'success' && steps.cache_dir.outcome == 'success' && steps.prev-result.outcome == 'success' }}
        continue-on-error: true
        with:
          verify-files: verify-files.json
          destination: .competitive-verifier/cache/result.json
          prev-result: ${{ steps.prev-result.outputs.path }}
          check: true

      # Override the implicit success() guard after a failed verification step.
      - name: Check documentation titles
        id: docs_title
        if: ${{ !cancelled() }}
        run: python3 scripts/check_docs_bilingual_titles.py docs

      - name: Prepare documentation result
        id: docs_result
        if: ${{ !cancelled() }}
        run: |
          python3 scripts/competitive_verifier_docs_result.py \
            verify-files.json \
            .competitive-verifier/cache/result.json \
            > .competitive-verifier/cache/docs-result.json.tmp
          mv \
            .competitive-verifier/cache/docs-result.json.tmp \
            .competitive-verifier/cache/docs-result.json

      - name: Generate docs
        id: docs
        if: ${{ !cancelled() && steps.docs_title.outcome == 'success' && steps.docs_result.outcome == 'success' }}
        uses: competitive-verifier/actions/docs@v2
        with:
          verify-files: verify-files.json
          verify-result: .competitive-verifier/cache/docs-result.json
          destination: _jekyll

      - name: Order library sections
        id: docs_index
        if: ${{ !cancelled() && steps.docs.outcome == 'success' }}
        run: python3 scripts/reorder_competitive_verifier_index.py _jekyll/index.md

      - name: Setup Pages
        id: pages_setup
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && steps.docs_index.outcome == 'success' }}
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        id: pages_build
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && steps.pages_setup.outcome == 'success' }}
        uses: actions/jekyll-build-pages@v1
        with:
          source: _jekyll
          destination: _site

      - name: Remove unsafe polyfill.io reference
        id: site_sanitize
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && steps.pages_build.outcome == 'success' }}
        run: |
          sudo chown -R "$USER":"$USER" _site

          python3 - <<'PY'
          from pathlib import Path
          import re

          pattern = re.compile(
              r'\s*<script\s+src="https://polyfill\.io/v3/polyfill\.min\.js\?features=es6"></script>\s*',
              re.IGNORECASE,
          )

          for path in Path("_site").rglob("*.html"):
              text = path.read_text(encoding="utf-8", errors="ignore")
              new_text = pattern.sub("\n", text)
              if new_text != text:
                  path.write_text(new_text, encoding="utf-8")
                  print(f"removed from {path}")
          PY

      - name: Check generated site for unsafe CDN references
        id: site_check
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && steps.site_sanitize.outcome == 'success' }}
        run: |
          if grep -RInE 'polyfill\.io|bootcss\.com|bootcdn\.net|staticfile\.org' _site; then
            echo "::error::Unsafe CDN reference remains in generated site"
            exit 1
          fi

      - name: Upload HTML artifact
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && steps.site_check.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: documentation-html
          path: _site
          if-no-files-found: error
          retention-days: 7

      - name: Upload Pages artifact
        id: pages-artifact
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && steps.site_check.outcome == 'success' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' && needs.verify-and-docs.outputs.pages-artifact-outcome == 'success' }}
    needs: verify-and-docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report-verification:
    if: ${{ !cancelled() }}
    needs: verify-and-docs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report standalone verification failure
        if: ${{ !cancelled() && needs.verify-and-docs.outputs.standalone-outcome != 'success' }}
        run: |
          echo "::error::Standalone generated assets failed"
          exit 1

      - name: Report competitive-verifier failure
        if: ${{ !cancelled() && needs.verify-and-docs.outputs.verifier-outcome != 'success' }}
        run: |
          echo "::error::competitive-verifier failed"
          exit 1
