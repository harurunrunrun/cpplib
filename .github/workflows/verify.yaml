name: verify

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "Makefile"
      - "docs/**"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "Makefile"
      - "docs/**"
      - ".competitive-verifier/**"
      - "config.toml"
      - ".github/workflows/verify.yaml"

  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore competitive-verifier environment
        uses: actions/cache@v4
        with:
          path: .competitive-verifier/venv
          key: competitive-verifier-${{ runner.os }}-${{ runner.arch }}-python-3.12-${{ hashFiles('Makefile') }}

      - name: Set up competitive-verifier
        run: make verifier-setup

      - name: Verify
        run: make verify CXXFLAGS="-std=c++20 -O2 -Wall -Wextra -Werror"

      - name: Upload verification result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: competitive-verifier-result
          path: .competitive-verifier/cache/result.json
          if-no-files-found: warn
          retention-days: 7
          include-hidden-files: true

  docs:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore competitive-verifier environment
        uses: actions/cache@v4
        with:
          path: .competitive-verifier/venv
          key: competitive-verifier-${{ runner.os }}-${{ runner.arch }}-python-3.12-${{ hashFiles('Makefile') }}

      - name: Set up competitive-verifier
        run: make verifier-setup

      - name: Restore verification result
        uses: actions/download-artifact@v5
        with:
          name: competitive-verifier-result
          path: .competitive-verifier/cache

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build HTML documentation
        run: make docs

      - name: Remove unsafe polyfill.io reference
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          pattern = re.compile(
              r'\s*<script\s+src="https://polyfill\.io/v3/polyfill\.min\.js\?features=es6"></script>\s*',
              re.IGNORECASE,
          )

          for path in Path(".competitive-verifier/site").rglob("*.html"):
              text = path.read_text(encoding="utf-8", errors="ignore")
              new_text = pattern.sub("\n", text)
              if new_text != text:
                  path.write_text(new_text, encoding="utf-8")
                  print(f"removed from {path}")
          PY

      - name: Check generated site for unsafe CDN references
        run: |
          if grep -RInE 'polyfill\.io|bootcss\.com|bootcdn\.net|staticfile\.org' .competitive-verifier/site; then
            echo "::error::Unsafe CDN reference remains in generated site"
            exit 1
          fi

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-html
          path: .competitive-verifier/site
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: true

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: .competitive-verifier/site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: pages
      cancel-in-progress: true

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
